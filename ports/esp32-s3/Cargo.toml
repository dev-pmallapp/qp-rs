[package]
name = "qf-port-esp32-s3"
version = "8.1.4"
edition = "2021"
authors = ["Prem Mallappa <prem.mallappa@gmail.com>"]
description = "ESP32-S3 hardware port for the Quantum Platform kernels"
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []
rt = ["critical-section", "dep:hal", "dep:hal-lxsis", "hal-lxsis/esp32s3"]

[dependencies]
qf = { path = "../../crates/qf", default-features = false }
qk = { path = "../../crates/qk", default-features = false }
qs = { path = "../../crates/qs", default-features = false }
hal       = { path = "../../hal",           optional = true }
hal-lxsis = { path = "../../hal/hal-lxsis", optional = true }
critical-section = { version = "1", optional = true }

[dev-dependencies]
critical-section = "1"
