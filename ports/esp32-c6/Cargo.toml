[package]
name = "qf-port-esp32-c6"
version = "8.1.4"
edition = "2021"
authors = ["Prem Mallappa <prem.mallappa@gmail.com>"]
description = "ESP32-C6 hardware port scaffolding for the Quantum Platform kernels"
publish = false

[lib]
path = "src/lib.rs"

[features]
default = []
rt = ["critical-section", "dep:hal", "dep:hal-rvsis", "hal-rvsis/esp32c6", "dep:comms"]

[dependencies]
qf = { path = "../../crates/qf", default-features = false }
qk = { path = "../../crates/qk", default-features = false }
qs = { path = "../../crates/qs", default-features = false }
hal       = { path = "../../hal",           optional = true }
hal-rvsis = { path = "../../hal/hal-rvsis", optional = true }
critical-section = { version = "1", optional = true }
comms     = { path = "../../crates/comms", optional = true }

[dev-dependencies]
critical-section = "1"
