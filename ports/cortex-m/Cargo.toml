[package]
name = "qf-port-cortex-m"
version = "8.1.4"
edition = "2021"
authors = ["Prem Mallappa <prem.mallappa@gmail.com>"]
description = "Cortex-M hardware port for the Quantum Platform QXK dual-mode kernel"
publish = false

[lib]
path = "src/lib.rs"

[features]
# Enable std on the host (used for tests and hosted emulation).
default = ["std"]
std = ["qf/std", "qk/std", "qxk/std"]
# Enable when building for a real Cortex-M target.
hw = ["dep:comms"]

[dependencies]
qf  = { path = "../../crates/qf",  default-features = false }
qk  = { path = "../../crates/qk",  default-features = false }
qxk = { path = "../../crates/qxk", default-features = false }
spin = "0.9"
hal-cmsis = { path = "../../hal/hal-cmsis", default-features = false }
comms = { path = "../../crates/comms", optional = true }
